data_dir: /kaggle/working/data
image_size: 256
num_classes: 3
val_split: 0.1
arch: fcn_resnet50
loss: ce_dice
batch_size: 8
num_workers: 4
epochs: 30
lr: 0.0001
grad_clip: 1.0
lr_schedule: cosine
warmup_epochs: 3
scheduler_step_size: 10
scheduler_gamma: 0.1
use_aug: true
use_amp: true
seed: 42
log_pred_every: 5
