data_dir: /kaggle/working/data
image_size: 128
num_classes: 3
val_split: 0.1
arch: unet
loss: ce
batch_size: 16
num_workers: 4
epochs: 25
lr: 0.001
grad_clip: 1.0
lr_schedule: step
warmup_epochs: 3
scheduler_step_size: 10
scheduler_gamma: 0.1
use_aug: false
use_amp: false
seed: 42
log_pred_every: 5
